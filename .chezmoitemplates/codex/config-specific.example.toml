# Copy this file to `.chezmoitemplates/codex/config-specific.toml` on a machine
# where you want local-only Codex settings that should not be committed.
# Root-level keys are safe here and will remain top-level in the rendered config.
#
# Examples:
#
# model = "gpt-5.5"
# review_model = "gpt-5.5"
#
# [windows]
# sandbox = "elevated"
#
# [profiles.readonly_quiet]
# approval_policy = "never"
# default_permissions = ":read-only"
